<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="Kindred Konnections group home preview image">
  <defs>
    <linearGradient id="bg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#0f1c2e" />
      <stop offset="60%" stop-color="#132946" />
      <stop offset="100%" stop-color="#d68a2e" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" x2="100%" y1="0%" y2="0%">
      <stop offset="0%" stop-color="#f7c16c" />
      <stop offset="100%" stop-color="#d68a2e" />
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="40" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" rx="48" />
  <circle cx="260" cy="140" r="180" fill="#ffffff18" filter="url(#soft)" />
  <circle cx="990" cy="520" r="200" fill="#f2e8db22" filter="url(#soft)" />
  <rect x="80" y="120" width="520" height="360" fill="#ffffff12" stroke="#f3e8db66" stroke-width="2" rx="32" />
  <text x="120" y="220" fill="#f3e8db" font-size="22" font-family="'DM Serif Display', Georgia, serif" letter-spacing="4">KINDRED KONNECTIONS</text>
  <text x="120" y="280" fill="#ffffff" font-size="52" font-family="'DM Serif Display', Georgia, serif" font-weight="400" letter-spacing="-1">Heart-led group home care</text>
  <text x="120" y="328" fill="#e9e2d6" font-size="26" font-family="'Manrope', 'Inter', system-ui" font-weight="500">Warm routines, clinical coordination, family-first updates.</text>
  <rect x="120" y="360" width="320" height="66" rx="16" fill="url(#accent)" />
  <text x="160" y="403" fill="#0f1c2e" font-size="22" font-family="'Manrope', 'Inter', system-ui" font-weight="700">Schedule a tour today</text>
  <text x="120" y="460" fill="#e9e2d6" font-size="18" font-family="'Manrope', 'Inter', system-ui">Serving adults & transitional-age youth with 24/7 awake support.</text>
</svg>
